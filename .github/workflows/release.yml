name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build pn
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          go build -v -ldflags "-s -w -X main.Version=$TAG" -o dist/pn ./cmd/pn

      - name: Rename binary
        shell: bash
        run: |
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$([[ "${{ runner.arch }}" == "X64" ]] && echo "amd64" || echo "arm64")
          mv dist/pn "dist/pn-${OS}-${ARCH}"

      # One single release, created/upgraded by every matrix job
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/pn-*
          generate_release_notes: true
